<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>VoiceCtrl Debug</title>
<style>
  :root { --bg:#151515; --card:#222; --line:#343434; --fg:#f4efe6; --muted:#9a9488; --ok:#60d394; --bad:#ff5560; --warn:#f0a93b; }
  * { box-sizing:border-box; }
  body { margin:0; background:radial-gradient(circle at 20% 0,#2d2418,#151515 42%); color:var(--fg); font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
  header { padding:22px 24px 12px; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
  h1 { margin:0; font:800 24px/1.1 ui-sans-serif,system-ui,sans-serif; letter-spacing:-.03em; }
  button,input { background:#2d2d2d; color:var(--fg); border:1px solid var(--line); border-radius:8px; padding:9px 10px; }
  button { cursor:pointer; font-weight:800; }
  main { padding:12px 24px 28px; display:grid; grid-template-columns:repeat(12,1fr); gap:14px; }
  .card { grid-column:span 6; background:rgba(34,34,34,.88); border:1px solid var(--line); border-radius:14px; padding:14px; box-shadow:0 16px 40px rgba(0,0,0,.22); }
  .wide { grid-column:1/-1; }
  .title { color:var(--muted); font:800 12px/1 ui-sans-serif,system-ui,sans-serif; text-transform:uppercase; letter-spacing:.08em; margin-bottom:10px; }
  .check { display:grid; grid-template-columns:18px 160px 1fr; gap:9px; align-items:start; padding:7px 0; border-top:1px solid rgba(255,255,255,.05); }
  .lamp { width:10px; height:10px; border-radius:50%; margin-top:3px; background:var(--bad); box-shadow:0 0 14px var(--bad); }
  .lamp.ok { background:var(--ok); box-shadow:0 0 14px var(--ok); }
  .label { font-weight:800; }
  .detail { color:var(--muted); overflow-wrap:anywhere; font-size:11px; }
  pre { margin:0; white-space:pre-wrap; overflow:auto; max-height:360px; color:#ddd; }
  .fix { padding:8px 10px; border-left:3px solid var(--warn); background:#2b2418; margin:6px 0; border-radius:8px; }
  .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .pill { display:inline-block; border:1px solid var(--line); border-radius:999px; padding:3px 8px; color:var(--muted); margin:2px; font-size:11px; }
  .pill.ext { border-color:var(--warn); color:var(--warn); }
  .pill.ok { border-color:var(--ok); color:var(--ok); }
  .meta { color:var(--muted); font-size:11px; }
  @media (max-width:800px) { .card { grid-column:1/-1; } header { align-items:flex-start; flex-direction:column; } }
</style>
</head>
<body>
<header>
  <div>
    <h1>VoiceCtrl Debug</h1>
    <div id="summary" class="detail">loading...</div>
  </div>
  <div class="row">
    <input id="testText" value="set the tempo to 120" size="28" />
    <button id="selfBtn">Self-Test</button>
    <button id="refreshBtn">Refresh</button>
  </div>
</header>
<main>
  <section class="card"><div class="title">Health Checks</div><div id="checks"></div></section>
  <section class="card"><div class="title">Fixes</div><div id="fixes"></div></section>
  <section class="card wide"><div class="title">Tools <span id="toolCount" class="meta"></span></div><div id="tools"></div></section>
  <section class="card wide"><div class="title">Last 50 Log Entries</div><pre id="logs"></pre></section>
  <section class="card wide"><div class="title">Last Self-Test</div><pre id="selftest">not run yet</pre></section>
</main>
<script>
const $ = id => document.getElementById(id);
function lamp(ok) { return `<span class="lamp${ok ? ' ok' : ''}"></span>`; }
function escapeHtml(s) { return String(s).replace(/[&<>]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[ch])); }
async function refresh() {
  const r = await fetch('/diagnostics');
  const j = await r.json();
  const checks = j.checks || [];
  const okCount = checks.filter(x => x.ok).length;
  const logOk = j.log_healthy;
  $('summary').innerHTML =
    `<span class="${logOk ? 'ok' : 'bad'}">${logOk ? 'logs ok' : 'log error: ' + escapeHtml(j.log_file_error||'')}</span>` +
    ` | ${okCount}/${checks.length} checks OK | pid=${j.pid} | rid=${j.rid || '—'}`;

  $('checks').innerHTML = checks.map(c =>
    `<div class="check">${lamp(c.ok)}$<span class="label">${escapeHtml(c.label)}</span>$<span class="detail">${escapeHtml(c.detail || '')}</span></div>`
  ).join('');

  const fixes = j.fixes || [];
  $('fixes').innerHTML = fixes.length
    ? fixes.map(f => `<div class="fix">${escapeHtml(f)}</div>`).join('')
    : '<span class="detail">All good — no fixes needed.</span>';

  const tools = j.tools || [];
  $('toolCount').textContent = `(${tools.length} tools)`;
  $('tools').innerHTML = tools.map(t =>
    `<span class="pill${t.upstream_supported ? ' ok' : ' ext'}">` +
    `${escapeHtml(t.tool)} → ${escapeHtml(t.ableton_command)}</span>`
  ).join('');

  const logs = (j.recent_logs || []);
  $('logs').textContent = logs.length
    ? logs.map(x => `[${x.ts}] ${x.level.toUpperCase()} [${x.rid || '—'}] ${x.msg}`).join('\n')
    : '(no log entries)';
}
async function selftest() {
  $('selftest').textContent = 'running...';
  const r = await fetch('/selftest', { method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify({ text:$('testText').value }) });
  const j = await r.json();
  $('selftest').textContent = JSON.stringify(j, null, 2);
  await refresh();
}
$('refreshBtn').onclick = refresh;
$('selfBtn').onclick = selftest;
refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
