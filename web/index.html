<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>VoiceCtrl</title>
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<style>
  :root {
    --bg:#222; --panel:#2b2a27; --fg:#f2eee5; --dim:#8b867b; --accent:#f0a93b; --hot:#ff7a2f; --err:#ff5560;
  }
  html,body {
    margin:0; padding:0; background:var(--bg); color:var(--fg);
    font-family:-apple-system,Helvetica,Arial,sans-serif;
    height:100%; width:100%; overflow:hidden;
    user-select:none; -webkit-user-select:none; cursor:pointer;
  }
  .stage {
    position:fixed; inset:0;
    display:grid;
    grid-template-rows: 58px 34px 18px 16px;
    align-items:center;
    justify-items:center;
    gap:3px;
    padding:6px;
    box-sizing:border-box;
  }
  .mark {
    width:48px; height:48px;
    border-radius:13px;
    box-shadow:0 8px 18px rgba(0,0,0,.32);
    background:linear-gradient(135deg,#ffc15a,#f07f2f 58%,#191919);
    display:grid;
    place-items:center;
    align-self:end;
    margin-bottom:-4px;
  }
  .mark img { width:34px; height:34px; display:block; }
  .bars {
    display:flex; gap:5px; align-items:center;
    align-self:center;
    min-height:28px;
    height:34px;
  }
  .bar {
    width:10px; min-height:16px; max-height:100%;
    background:var(--accent); border-radius:6px;
    transition:height .07s linear, background .25s, opacity .25s;
  }
  .stage.idle      .bar { background:var(--dim); opacity:.55; }
  .stage.thinking  .bar { background:var(--accent); opacity:.9; }
  .stage.error     .bar { background:var(--err); }
  .label {
    font-size:clamp(12px, 4.5vw, 15px); font-weight:800; color:var(--fg);
    text-align:center; line-height:1.15;
    max-width:96%;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .stage.idle .label { color:var(--dim); }
  .sub {
    font-size:clamp(10px, 3.3vw, 12px); color:var(--dim); text-align:center;
    min-height:12px;
    max-width:96%;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .dots {
    position:absolute;
    top:8px;
    right:8px;
    display:flex; gap:6px;
    margin-top:0;
  }
  .dot { width:6px; height:6px; border-radius:50%; background:#444; }
  .dot.on  { background:#60d394; }
  .dot.off { background:var(--err); }
  .rid {
    position:absolute; left:8px; top:7px;
    color:#6b9fd4; font-size:9px; font-weight:800;
    max-width:80px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .debugLink {
    position:absolute; left:8px; top:7px;
    color:#9ac7ff; font-size:10px; font-weight:800;
    text-decoration:none;
  }
  .stage.embed .sub { max-width:88%; }
  .stage.embed .mark { width:44px; height:44px; border-radius:12px; }
  .stage.embed .mark img { width:31px; height:31px; }
  .debug {
    position:absolute; left:6px; right:6px; bottom:6px;
    max-height:44%;
    background:rgba(0,0,0,.58);
    border:1px solid #3b3b3b;
    border-radius:6px;
    font-size:10px;
    color:#cfcfcf;
  }
  .debug > summary {
    padding:4px 6px;
    cursor:pointer;
    color:#9ac7ff;
    font-weight:700;
  }
  .debug pre {
    margin:0; padding:6px;
    overflow:auto;
    max-height:160px;
    white-space:pre-wrap;
    line-height:1.3;
  }
</style>
</head>
<body>
<div class="stage idle" id="stage">
  <div class="mark" title="VoiceCtrl"><img src="icon.svg" alt="" /></div>
  <div class="bars" id="bars">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div>
  </div>
  <div class="label" id="label">Click to speak</div>
  <div class="sub"   id="sub"></div>
  <div class="dots">
    <span class="dot" id="dotAbleton" title="Ableton"></span>
    <span class="dot" id="dotOllama"  title="Ollama"></span>
  </div>
  <span class="rid" id="ridDisplay" title="Request ID"></span>
  <a class="debugLink" id="debugLink" target="_blank">debug</a>
  <details class="debug" id="debugBox">
    <summary>Debug</summary>
    <pre id="debugText">waiting...</pre>
  </details>
</div>

<script>
const params = new URLSearchParams(location.search);
const HOST = params.get("api") ? decodeURIComponent(params.get("api")) : "http://127.0.0.1:8765";
const stage = document.getElementById("stage");
const label = document.getElementById("label");
const sub   = document.getElementById("sub");
const bars  = document.getElementById("bars").querySelectorAll(".bar");
const dotA  = document.getElementById("dotAbleton");
const dotO  = document.getElementById("dotOllama");
const debugText = document.getElementById("debugText");
const ridEl = document.getElementById("debugLink");
const ridDisplay = document.getElementById("ridDisplay");
ridEl.href = HOST + "/debug.html";
if (params.get("embed") === "1") stage.classList.add("embed");

let recorder = null, chunks = [], stream = null, audioCtx = null, analyser = null, raf = null;
let state = "idle";
let recording = false;
let lastRid = "";
let history = [];

function userError(message, rid) {
  if (!message) return { label:"Failed", sub:"open Debug for details" };
  const s = rid ? `[${rid.slice(0,8)}] ` : "";
  if (message.includes("ECONNREFUSED") || message.includes("connection failed") || message.includes("connection refused")) {
    return { label:"Ableton offline", sub:s + "Enable AbletonMCP in Live Preferences" };
  }
  if (message.includes("timeout") && (message.includes("ableton") || message.includes("Ableton"))) {
    return { label:"Ableton timeout", sub:s + "Command timed out — Live busy?" };
  }
  if (message.includes("protocol") || message.includes("Bad response")) {
    return { label:"Ableton error", sub:s + "Bad response from AbletonMCP" };
  }
  if (message.includes("circuit open")) {
    return { label:"Ollama cooling down", sub:s + "Too many failures — wait 60s" };
  }
  if (message.includes("ollama") || message.includes("Ollama")) return { label:"Ollama error", sub:s + message };
  if (message.includes("whisper") || message.includes("Whisper")) return { label:"Whisper error", sub:s + message };
  if (message.includes("Failed to fetch") || message.includes("fetch failed") || message.includes("NetworkError")) {
    return { label:"Server unreachable", sub:s + "VoiceCtrl may have crashed — reinsert device" };
  }
  return { label:"Failed", sub:s + message };
}

function setState(next, l, s) {
  state = next;
  stage.classList.remove("idle","listening","thinking","error");
  stage.classList.add(next);
  if (l !== undefined) label.textContent = l;
  if (s !== undefined) sub.textContent   = s;
}

async function refreshStatus() {
  try {
    const r = await fetch(HOST + "/status"); const j = await r.json();
    dotA.className = "dot " + (j.ableton ? "on" : "off");
    dotO.className = "dot " + (j.ollama_ok ? "on" : "off");
    if (j.service !== "voicectrl-node") {
      setState("error", "Wrong backend", "port 8765 used by another service");
    } else if (state === "idle") {
      if (!j.ableton) {
        const info = userError(j.ableton_error || "AbletonMCP offline");
        sub.textContent = info.sub; sub.title = j.ableton_error || "";
      } else if (!j.ollama_ok) {
        const info = userError(j.ollama_error || "Ollama unavailable");
        sub.textContent = info.sub; sub.title = j.ollama_error || "";
      }
    }
  } catch { dotA.className = "dot off"; dotO.className = "dot off"; }
}

async function refreshDebug() {
  try {
    const r = await fetch(HOST + "/debug"); const j = await r.json();
    const lines = (j.recent_logs || []).slice(-50).map(x => `[${x.level[0].toUpperCase()}] ${x.msg}`);
    debugText.textContent =
      `service=${j.service} pid=${j.pid} uptime=${j.uptime_s}s ` +
      `log=${j.log_healthy ? "ok" : "ERR: " + (j.log_file_error || "unknown")}\n` +
      `root=${j.root}\n` +
      `model=${j.paths?.whisper_model ? "ok" : "?"} ` +
      `whisper=${j.exists?.whisper_cli ? "ok" : "MISSING"} ` +
      `ffmpeg=${j.exists?.ffmpeg ? "ok" : "MISSING"}\n` +
      lines.join("\n");
  } catch (e) {
    debugText.textContent = "debug unavailable: " + e.message;
  }
}
refreshStatus();
refreshDebug();
setInterval(refreshStatus, 3000);
setInterval(refreshDebug, 1000);

function animate() {
  if (state === "listening" && analyser) {
    const data = new Uint8Array(analyser.fftSize);
    analyser.getByteTimeDomainData(data);
    let sum = 0; for (let i=0;i<data.length;i++){const v=(data[i]-128)/128; sum+=v*v;}
    const rms = Math.sqrt(sum/data.length);
    const lvl = Math.min(1, rms * 4);
    const max = bars[0].parentElement.clientHeight;
    bars.forEach((b,i)=>{
      const peak = Math.sin((Date.now()/110)+i*0.55)*0.45+0.55;
      b.style.height = Math.max(18, lvl*peak*max + 18) + "px";
    });
  } else if (state === "thinking") {
    const max = bars[0].parentElement.clientHeight;
    bars.forEach((b,i)=>{
      const v = Math.abs(Math.sin((Date.now()/250)+i*0.7));
      b.style.height = (18 + v*max*0.6) + "px";
    });
  } else {
    bars.forEach(b => b.style.height = "");
  }
  raf = requestAnimationFrame(animate);
}
animate();

async function startRecording() {
  if (recording) return;
  try { stream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
  catch (e) { setState("error","Mic blocked", e.message); return; }
  recording = true; chunks = [];
  recorder = new MediaRecorder(stream, { mimeType: "audio/webm" });
  recorder.ondataavailable = e => e.data.size && chunks.push(e.data);
  recorder.onstop = onStop;
  recorder.start();
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const src = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser(); analyser.fftSize = 512;
  src.connect(analyser);
  setState("listening", "Listening", "tap to stop");
}

async function stopRecording() {
  if (!recording) return;
  recording = false;
  setState("thinking", "Connecting...", "Connecting to AI");
  recorder.stop();
  if (stream)   stream.getTracks().forEach(t=>t.stop());
  if (audioCtx) audioCtx.close();
  analyser = null; audioCtx = null; stream = null;
}

async function onStop() {
  const blob = new Blob(chunks, { type:"audio/webm" });
  try {
    const fd = new FormData(); fd.append("audio", blob, "speech.webm");
    const r = await fetch(HOST + "/listen", { method:"POST", body: fd });
    const j = await r.json();
    lastRid = j.request_id || "";
    // persist history
    history.push({ ts: new Date().toISOString(), rid: lastRid, transcript: j.transcript });
    if (history.length > 20) history.shift();
    ridDisplay.textContent = lastRid ? lastRid.slice(0,8) : "";

    if (j.transcript) {
      const errors = (j.actions||[]).filter(a=>a.error);
      const ok = errors.length === 0;
      const firstError = errors[0]?.error || "";
      const friendly = userError(firstError, lastRid);
      const toolNames = (j.actions||[]).map(a=>a.tool).join(", ");
      setState(ok ? "idle" : "error",
               ok ? (j.transcript.length<32 ? j.transcript : "Done") : friendly.label,
               ok ? (j.assistant || toolNames) : friendly.sub);
    } else {
      setState("idle", "Click to speak", "(no speech)");
    }
  } catch (e) {
    setState("error", "Network error", e.message);
    ridDisplay.textContent = lastRid ? lastRid.slice(0,8) : "";
  }
  setTimeout(()=>{ if (state!=="listening") setState("idle","Click to speak",""); }, 2500);
}

document.body.addEventListener("click", () => recording ? stopRecording() : startRecording());
window.addEventListener("keydown", e => {
  if (e.code === "Space" && !e.repeat && !recording) { e.preventDefault(); startRecording(); }
});
window.addEventListener("keyup", e => {
  if (e.code === "Space" && recording) { e.preventDefault(); stopRecording(); }
});
</script>
</body>
</html>
